<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Struk</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1976d2">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Memanggil file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Cetak Struk</h2>
    
    <div class="container">
        <!-- KOTAK FORM DENGAN SISTEM TAB -->
        <div class="box">
            
            <!-- MENU NAVIGASI TAB -->
            <div class="tab-menu">
                <button id="btnTabTransaksi" class="tab-btn active" onclick="pindahTab('transaksi')">⚡ TRANSAKSI</button>
                <button id="btnTabSetelan" class="tab-btn" onclick="pindahTab('setelan')">⚙️ SETELAN SPBU</button>
            </div>

            <!-- TAB 1: KHUSUS DATA TRANSAKSI UTAMA (SANGAT RINGKAS) -->
            <div id="tabTransaksi" class="tab-content active">
                <div class="section-title" style="margin-top: 0;">Data Transaksi Pelanggan</div>
                
                <div class="grid-2">
                    <div>
                        <label class="input-highlight" style="padding: 2px 5px; border-radius: 3px;">Total Beli (Rp)</label>
                        <input type="number" id="totalBayar" value="250000" class="input-highlight">
                    </div>
                    <div>
                        <label style="padding: 2px 5px;">Uang Tunai / CASH (Rp)</label>
                        <input type="number" id="cashBayar" value="300000" class="input-cash" placeholder="Sesuai Total">
                    </div>
                </div>

                <label>Plat No (Opsional)</label>
                <input type="text" id="platNo" value="" placeholder="Contoh: B 1234 ABC">

                <label>Tanggal & Waktu</label>
                <input type="text" id="waktuCustom" class="input-highlight" placeholder="Otomatis realtime">
                
                <div class="grid-2">
                    <div><label>Shift</label><input type="text" id="shift" value="3"></div>
                    <div><label>No. Trans</label><input type="text" id="noTrans" value="2565855"></div>
                </div>
                <div class="grid-2">
                    <div><label>Pompa</label><input type="text" id="pompa" value="4"></div>
                    <div><label>Operator</label><input type="text" id="operator" value="Septi"></div>
                </div>

                <!-- TOMBOL EKSEKUSI UTAMA -->
                <button class="btn-preview" onclick="buatStruk()">BUAT PREVIEW STRUK</button>
                <button class="btn-print" onclick="printBluetooth()">🖨️ CETAK BLUETOOTH</button>
                <button class="btn-reset" onclick="putuskanBluetooth()">RESET KONEKSI PRINTER</button>
                <div id="statusText">Status: Standby</div>
            </div>

            <!-- TAB 2: PENGATURAN SPBU & FORMAT (TERSEMBUNYI SAAT TRANSAKSI) -->
            <div id="tabSetelan" class="tab-content">
                <div class="profil-box">
                    <label style="margin-top: 0; color: #0d47a1;">📂 Format SPBU Tersimpan:</label>
                    <select id="dropdownProfil" class="input-highlight" onchange="muatProfilPilihan()">
                        <option value="">-- Ketik Format Baru di Bawah --</option>
                    </select>
                    <div class="grid-2" style="margin-top: 10px;">
                        <button class="btn-save-new" onclick="simpanSebagaiBaru()">➕ SIMPAN BARU</button>
                        <button class="btn-update" onclick="simpanPerubahan()">💾 UPDATE FORMAT</button>
                    </div>
                    <button class="btn-delete" onclick="hapusProfil()">🗑️ Hapus Format Terpilih</button>
                    
                    <label style="border-top: 1px dashed #90caf9; margin-top: 12px; padding-top: 8px; color: #4a148c;">🛡️ Backup & Restore Sistem:</label>
                    <div class="grid-2" style="margin-top: 5px;">
                        <button class="btn-backup" onclick="exportBackupData()">📥 SIMPAN BACKUP</button>
                        <button class="btn-restore" onclick="triggerImportBackup()">📤 MUAT BACKUP</button>
                    </div>
                    <input type="file" id="inputBackup" accept=".json" style="display: none;" onchange="importBackupData(this)">
                </div>

                <label>Upload Logo (Opsional)</label>
                <input type="file" id="inputLogo" accept="image/*">

                <div class="section-title">1. Informasi SPBU</div>
                <div class="grid-2">
                    <div><label>No. SPBU</label><input type="text" id="noSpbu" value="5160177"></div>
                    <div><label>Nama SPBU</label><input type="text" id="namaSpbu" value="SPBU SURABAYA SOETOMO"></div>
                </div>
                <label>Alamat Baris 1</label>
                <input type="text" id="alamatSpbu1" value="JL. DIPONEGORO, LOHO88">
                <label>Alamat Baris 2 (Opsional)</label>
                <input type="text" id="alamatSpbu2" value="">

                <div class="section-title">2. Detail Harga BBM</div>
                <div class="grid-2">
                    <div>
                        <label>Jenis BBM</label>
                        <input type="text" id="jenisBbm" value="Pertalite">
                    </div>
                    <div><label>Harga Jual/Liter</label><input type="number" id="hargaJual" value="10000"></div>
                </div>
                <label>Subsidi / Liter (Rp) *Isi 0 jika non-subsidi</label>
                <input type="number" id="subsidiLiter" value="1700">
                
                <label style="color: #d32f2f;">Pesan Subsidi (Gunakan kata [SUBSIDI])</label>
                <textarea id="pesanSubsidi" rows="3">Anda mendapat subsidi dari Pemerintah sebesar Rp[SUBSIDI] (Perhitungan Subsidi Unaudited atau Estimasi). Gunakan BBM Subsidi secara bijak.</textarea>
                
                <label style="color: #1976d2;">Ucapan Terima Kasih (Opsional)</label>
                <input type="text" id="keterangan" value="">
                
                <p style="font-size: 11px; color: #757575; text-align: center; margin-top: 15px;">Setelah mengubah setelan, klik kembali ke Tab TRANSAKSI di atas untuk mencetak.</p>
            </div>

        </div>

        <!-- KOTAK PREVIEW STRUK -->
        <div class="box">
            <label>Preview Struk:</label>
            <div class="struk-wrapper">
                <div>
                    <div class="logo-preview"><img id="logoUpload" src="" style="display: none;"></div>
                    <pre id="hasilStruk">Klik "BUAT PREVIEW" dulu</pre>
                </div>
            </div>
        </div>

        <!-- KOTAK RIWAYAT CETAK BERHASIL -->
        <div class="box">
            <label style="font-size: 16px; margin-top: 0;">Riwayat Cetak Berhasil</label>
            <div style="overflow-x: auto;">
                <table id="tabelRiwayat">
                    <thead>
                        <tr><th>Tgl & Waktu</th><th>Plat No</th><th>Produk</th><th class="text-right">Total</th><th class="text-center">Aksi</th></tr>
                    </thead>
                    <tbody id="isiRiwayat"></tbody>
                </table>
            </div>
            <button class="btn-clear" onclick="hapusRiwayat()">Hapus Semua Riwayat</button>
        </div>
    </div>

    <!-- Memanggil file JavaScript eksternal -->
    <script src="script.js"></script>

</body>
</html>
